  - series: vienna/folktanz-abend
    title: FolkTanz-Abend mit den TradTöchtern
    description: |
      ‣ 16h30 - 18h00 Tanz-Workshop mit Vivien Zeller
      ‣ 19h00 - 22h30 Tanzabend mit TradTöchter (Vivien Zeller - Geige, Gesang; Ursula Suchanek - Quinton, Gesang)

      "TradTöchter – das ist neue Geigenmusik! Das sind groovige Eigenkompositionen und gepfefferte Arrangements traditioneller Tanzmelodien und Lieder. Die beiden Musikerinnen lieben traditionelle Tanzmusik genauso wie modern folk und spielen zum schwofen, zuhören und abtanzen. Berückende Melodien aus eigener Feder gesellen sich zu mitreißenden Arrangements traditioneller Stücke und Lieder. Denn nicht nur Instrumentalmelodien bringen die beiden Geigerinnen in die Tanz- und Konzertsäle, es wird auch getrallt und gesungen. Mal sanft, mal wild, von Sehnsucht, goldenen Ringlein, der weiten See, wilden Ausschweifungen und faulen Äpfeln. Das Duo TradTöchter hat sich Anfang 2016 zusammengetan und bezaubert Tänzer genauso wie Zuhörer, bringt Ohren zum Tanzen und Füße zum Lauschen."

      Es wird Musik gespielt, zu der das übliche Balfolk-Repertoire (Walzer, Polka, Mazurka, Schottisch, Mixer, etc. ) und Wickler getanzt werden kann.

      Kommt gerne alleine oder gemeinsam: Fixe Tanzpartner:innen sind nicht üblich oder gar notwendig.

      Eintritt inklusive Tanzworkshop: red. € 10,- / € 14,-. Keine Anmeldung erforderlich.
    start: 2025-06-01T16:30:00
    end: 2025-06-01T22:30:00
    links:
      video: https://tradtoechter.com/videos/
      fb.event: https://www.facebook.com/events/612654128444368/
    workshop_event:
      title: Tanzworkshop vor dem FolkTanz-Abend
      end: 2025-06-01T18:00:00
  - series: vienna/folktanz-abend
    title: FolkTanz-Abend mit Akleja
    description: |
      Mit dem Duo Akleja:
      Regina Kunkel - Nyckelharpa
      Björn Kaidel - Nyckelharpa, Gitarre, Cittern

      Die Sommerpause ist dieses Jahr ein bisschen kürzer, es geht schon im August wieder los! Der Tanzabend startet wie üblich um 19 Uhr, aber kommt gern schon früher, wenn ihr vorher zu Abend essen möchtet.

      "Akleja erforscht musikalisch, was ihnen am Herzen liegt - Natur, Begegnungen und berührende Augenblicke. Sie spielen instrumentale Folkmusik auf Nyckelharpa, Gitarre und Cittern. Besonders geprägt sind sie von Tanzmusik aus alten Notenbüchern sowie der Musiktradition Schwedens, des Heimatlandes der Nyckelharpa. Mit ihrer Musik gehen sie eigene Wege und erschaffen eine einzigartige Klangwelt voller Lebensfreude und Atmosphäre. Mit ihrem mitreißendem Spiel zeichnen sie klingende Bilder und entreißen ihr Publikum mühelos dem Alltag. Im März 2024 veröffentlichten Akleja ihr neues Album "Im Verborgenen". Mit diesem widmen sie sich den kleinen Dingen, deren Bedeutsamkeit häufig verborgen bleibt. Das Album wurde für den Preis der deutschen Schallplattenkritik nominiert und wurde vom belgischen Magazin 'Le Canard Folk' zu einer der CDs des Monats April 2024 gekürt."

      Es wird Musik gespielt, zu der das übliche Balfolk-Repertoire (Walzer, Polka, Mazurka, Schottisch, Mixer, etc. ) und Wickler getanzt werden kann.

      Kommt gerne alleine oder gemeinsam: Fixe Tanzpartner:innen sind nicht üblich oder gar notwendig.

      Eintritt inklusive Tanzworkshop: red. € 10,- / € 14,-. Keine Anmeldung erforderlich.
    start: 2025-08-24T19:00:00
    end: 2025-08-24T22:30:00
    links:
      fb.event: https://www.facebook.com/events/1897989534282565/

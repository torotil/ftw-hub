    workshop_event:
      end: 2026-03-29T18:00:00
      title: "Workshop vor dem FolkTanz-Abend: „Tanzend spielen mit der Sprache der Musik“"
      description: |
        Was passiert mit der Musik, wenn wir einen Schottisch oder eine Mazurka tanzen und dabei aufeinander achten? Wie kann beim Tanzen ein musikalischer Dialog zwischen Musizierenden und Tanzenden entstehen?
        Wenn es in der Musik eine plötzliche Wendung gibt, wie können wir das in unser Tanzen miteinbeziehen? Wie können wir allgemein mit Melodien und Rhythmen spielen?
        Diese und andere musikalische Ideen werden wir besprechen und tänzerisch erforschen.

        Léo ist Musiker in verschiedenen Balfolk-Bands und auf den Tanzböden von Festivals in Frankreich, der Schweiz, Deutschland, Italien, Spanien und Belgien unterwegs.

        Sein Tanzstil hat sich durch unterschiedliche Einflüsse und Begegnungen geformt, in Seminaren und Workshops und natürlich auch auf dem Tanzboden.

        Eintritt € 10,-; beim Besuch des Tanzabends ist der Workshop inkludiert.

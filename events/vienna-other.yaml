  - title: Tanzkonzert „Die Paradeiser“+ „Folk Fiddle Ensemble Wien“
    description: |
      „Die Paradeiser” sind ein junges Projekt aus volksmusikbegeisterten Mitgliedern zwischen 20 und 70 Jahren. Sie spielen hauptsächlich Landler, Schleunige, Walzer, Polkas und Boarische ("Schottisch"). Ergänzt wird das Programm durch ungarische Czardas, slowakische Romaweisen, Klezmer-Hochzeitsstücke oder serbische Kolos.
      Besetzung: Hermann Fritz: Geige, Angelika Hudler: Geige, Johanna Senger: Bratsch, Philipp Schachner: Kontrabass

      Das „Folk Fiddle Ensemble Wien“ ist eine Gruppe enthusiastischer Fiddler*innen und anderer Instrumentalist*innen. Sie spielen Stücke aus verschiedensten, größtenteils europäischen Folk-Musik-Traditionen.
      Besetzung: Angelika Hudler: Geige + Arrangement + Leitung, Guntra Aistara: Geige, Frederik Feldmann: Geige, Andrea Jantschko: Oud, Henri Katz: Geige, Andrea Malfer: Geige, Walter Pöffel: Geige, Clara Siersch: Bratsche, Nükhet Stanfel: Geige, Mariann Unterluggauer: Geige. Begleitung: Johanna Senger: Bratsch, Philipp Schachner: Kontrabass

      Dieses Konzert wird vom "Kulturverein EVOE" veranstaltet.
      Eintritt: Freie Spende (Vorschlag 15-25€)
    location: Kulturzentrum im Amerlinghaus, 07., Schrankgasse 2
    start: 2025-11-02T18:00:00
    end: 2025-11-02T22:00:00

  - title: „Von den Tanzschritten zum Tanzen“ mit Annekatrin Gall und Simon Wascher
    description: |
      "Zwei links, zwei rechts und rundherum" ist schnell gelernt und macht auch Freude.

      Mit dem Tanzen waechst aber oft der Wunsch nach mehr Leichtigkeit, Gewandtheit, Groove, Laessigkeit, Gemuetlichkeit, Erleben, Koennen, Sicherheit... weniger Kraftaufwand fuer mehr Vergnuegen ... darum geht es in diesem Kurs anhand ausgewaehlter Tanzformen wie zum Beispiel Schottisch, Mazurka, Menuett ...

      Vorkenntnisse sind keine erforderlich. Eine Teilnahme alleine ist selbstverstaendlich moeglich und sinnvoll.

      Kursbeitrag: 180€
